<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RISE - Login</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      background: url('bg1.png') no-repeat center center fixed;
      background-size: cover;
    }

    .overlay {
      position: relative;
      min-height: 100vh;
      width: 100%;
      background: linear-gradient(
        135deg,
        rgba(30, 27, 75, 0.85) 0%,
        rgba(49, 46, 129, 0.85) 100%
      );
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

<body class="pt-16">

  <!-- NAVBAR -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-md shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

      <div class="flex items-center justify-between h-16">

        <div class="flex-shrink-0">
          <a href="index.html" class="text-2xl font-black text-blue-600">
            RISE <span class="text-gray-700">| Langkah Awal</span>
          </a>
        </div>

        <div class="hidden md:flex items-center gap-4">
          <a href="identitas.html"
            class="bg-blue-600 text-white px-6 py-2.5 rounded-full text-base font-semibold hover:bg-blue-700 transition shadow-lg">
            Daftar
          </a>

          <a href="login.html"
            class="bg-gray-100 text-gray-700 px-6 py-2.5 rounded-full text-base font-semibold hover:bg-gray-200 transition border border-gray-300">
            Login
          </a>
        </div>

        <div class="md:hidden">
          <button id="mobile-menu-btn"
            class="text-gray-700 p-2 rounded-md hover:bg-gray-100">

            <svg xmlns="http://www.w3.org/2000/svg"
              class="h-6 w-6"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor">

              <path stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16" />
            </svg>

          </button>
        </div>

      </div>
    </div>

    <!-- MOBILE MENU -->
    <div id="mobile-menu"
      class="hidden md:hidden bg-white border-t border-gray-200">

      <div class="px-4 py-4 space-y-3">

        <a href="identitas.html"
          class="block w-full bg-blue-600 text-white px-6 py-3 rounded-full text-center">
          Daftar
        </a>

        <a href="login.html"
          class="block w-full bg-gray-100 text-gray-700 px-6 py-3 rounded-full text-center border">
          Login
        </a>

      </div>
    </div>
  </nav>

  <!-- LOGIN FORM -->
  <div class="overlay py-16 px-4">

    <div class="max-w-lg w-full bg-white/95 p-8 md:p-10 rounded-2xl shadow-2xl backdrop-blur-sm">

      <div class="text-center mb-8">
        <h1 class="text-3xl md:text-4xl font-black mb-3 text-indigo-900">
          Masuk ke Akun RISE
        </h1>

        <p class="text-indigo-600 text-base">
          Gunakan username dan password yang sudah terdaftar.
        </p>
      </div>

      <!-- ALERT -->
      <div id="alert-error"
        class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-6 text-center">
      </div>

      <!-- FORM -->
      <form id="form-login" class="space-y-5">

        <div>
          <label for="username"
            class="block text-sm font-semibold mb-2 text-indigo-900">
            Username
          </label>

          <input type="text"
            id="username"
            placeholder="Masukkan username"
            class="w-full px-4 py-3 rounded-xl text-gray-900 focus:ring-2 focus:ring-blue-400 focus:outline-none bg-indigo-50 border border-indigo-200"
            required>
        </div>

        <div>
          <label for="password"
            class="block text-sm font-semibold mb-2 text-indigo-900">
            Password
          </label>

          <input type="password"
            id="password"
            placeholder="Masukkan password"
            class="w-full px-4 py-3 rounded-xl text-gray-900 focus:ring-2 focus:ring-blue-400 focus:outline-none bg-indigo-50 border border-indigo-200"
            required>
        </div>

        <button type="submit"
          class="w-full bg-blue-600 text-white font-bold py-4 rounded-full hover:bg-blue-700 transition transform hover:scale-105 shadow-xl mt-6">
          Login
        </button>

      </form>

      <div class="text-center mt-6">
        <p class="text-indigo-600">
          Belum punya akun?
          <a href="identitas.html"
            class="text-blue-600 font-bold hover:underline">
            Daftar sekarang
          </a>
        </p>
      </div>

    </div>
  </div>

  <!-- SCRIPT -->
  <script>

    // AUTO LOGIN JIKA SESSION ADA
    const existingSession = localStorage.getItem('rise_session');

    if (existingSession && existingSession !== "undefined" && existingSession !== "null") {
      window.location.href = 'ruangdiskusi.html';
    }

    // ELEMENT
    const form = document.getElementById('form-login');
    const alertError = document.getElementById('alert-error');

    // SUBMIT LOGIN
    form.addEventListener('submit', function(e) {

      e.preventDefault();

      // RESET ALERT
      alertError.className =
        'hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-6 text-center';

      // INPUT
      const username = document
        .getElementById('username')
        .value
        .trim()
        .toLowerCase();

      const password = document
        .getElementById('password')
        .value
        .trim();

      // VALIDASI
      if (!username || !password) {

        alertError.textContent = 'Mohon isi username dan password.';
        alertError.classList.remove('hidden');

        return;
      }

      // AMBIL USER
      const userKey = 'rise_user_' + username;

      const savedUser = localStorage.getItem(userKey);

      console.log("USER KEY:", userKey);
      console.log("DATA:", savedUser);

      // USER TIDAK ADA
      if (!savedUser) {

        alertError.textContent = 'Username tidak ditemukan.';
        alertError.classList.remove('hidden');

        return;
      }

      // PARSE
      let userData;

      try {

        userData = JSON.parse(savedUser);

      } catch (err) {

        alertError.textContent = 'Data akun rusak.';
        alertError.classList.remove('hidden');

        return;
      }

      // PASSWORD SALAH
      if (userData.password !== password) {

        alertError.textContent = 'Password salah.';
        alertError.classList.remove('hidden');

        return;
      }

      // SIMPAN SESSION
      localStorage.setItem('rise_session', username);

      // SUCCESS
      alertError.textContent = '✓ Login berhasil! Mengalihkan...';

      alertError.className =
        'bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-lg mb-6 text-center';

      alertError.classList.remove('hidden');

      // REDIRECT
      setTimeout(() => {

        window.location.href = 'ruangdiskusi.html';

      }, 1000);

    });

    // MOBILE MENU
    const mobileBtn = document.getElementById('mobile-menu-btn');

    const mobileMenu = document.getElementById('mobile-menu');

    mobileBtn.addEventListener('click', () => {

      mobileMenu.classList.toggle('hidden');

    });

  </script>

</body>
</html>
